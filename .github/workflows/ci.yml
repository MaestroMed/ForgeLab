name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node — lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

  python:
    name: Python — pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/forge-engine
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: apps/forge-engine/requirements*.txt

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # requirements.txt pulls in heavy ML wheels (torch, faster-whisper).
      # For CI correctness we use the minimal set; full wheels can be added
      # later in a dedicated integration job.
      - name: Install Python deps
        run: pip install -r requirements-minimal.txt pytest pytest-asyncio

      - run: pytest -q
